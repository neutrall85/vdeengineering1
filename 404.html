<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена | ЕАС Групп</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Стили специально для страницы 404 */
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8f9fa 0%, #e4e8ec 100%);
            padding: var(--space-8);
            position: relative;
            overflow: hidden;
        }

        .error-container {
            text-align: center;
            max-width: 600px;
            z-index: 1;
        }

        .error-code {
            font-size: clamp(8rem, 20vw, 15rem);
            font-weight: 900;
            color: var(--vd-orange);
            line-height: 1;
            margin-bottom: var(--space-4);
            text-shadow: 4px 4px 0 rgba(0, 78, 150, 0.1);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .error-title {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: var(--text-dark);
            margin-bottom: var(--space-4);
            font-weight: 700;
        }

        .error-message {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            color: var(--metallic);
            margin-bottom: var(--space-8);
            line-height: 1.6;
        }

        .error-actions {
            display: flex;
            gap: var(--space-4);
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-error {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-4) var(--space-8);
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            transition: all var(--duration-normal) var(--ease-smooth);
            cursor: pointer;
            border: none;
        }

        .btn-error-primary {
            background: var(--gradient-orange);
            color: white;
            box-shadow: var(--shadow-orange);
        }

        .btn-error-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(var(--vd-orange-rgb), 0.4);
        }

        .btn-error-secondary {
            background: white;
            color: var(--vd);
            border: 2px solid var(--vd);
            box-shadow: var(--shadow-md);
        }

        .btn-error-secondary:hover {
            background: var(--vd-light-blue);
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .error-icon {
            font-size: 3rem;
            margin-bottom: var(--space-4);
        }

        /* Декоративные элементы */
        .error-bg-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            z-index: 0;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: var(--vd-orange);
            top: -100px;
            left: -100px;
            animation: pulse 4s ease-in-out infinite;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: var(--vd);
            bottom: -150px;
            right: -150px;
            animation: pulse 5s ease-in-out infinite reverse;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.15;
            }
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .error-actions {
                flex-direction: column;
                align-items: center;
            }

            .btn-error {
                width: 100%;
                max-width: 300px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="error-page">
        <!-- Декоративные элементы -->
        <div class="error-bg-shape shape-1"></div>
        <div class="error-bg-shape shape-2"></div>

        <div class="error-container">
            <div class="error-icon">🔧</div>
            <div class="error-code">404</div>
            <h1 class="error-title">Упс! Страница не найдена</h1>
            <p class="error-message">
                Похоже, вы перешли по ссылке, которая ведёт в никуда.<br>
                Возможно, страница была удалена или перемещена.<br>
                Не волнуйтесь, мы поможем вам вернуться на правильный путь!
            </p>
            <div class="error-actions">
                <a href="index.html" class="btn-error btn-error-primary">
                    <span>🏠</span> На главную
                </a>
                <button onclick="history.back()" class="btn-error btn-error-secondary">
                    <span>←</span> Назад
                </button>
            </div>
        </div>
    </div>

    <script>
        // Автоматическое перенаправление на главную через 30 секунд
        let redirectTimer = setTimeout(() => {
            window.location.href = 'index.html';
        }, 30000);

        // Останавливаем таймер при любом взаимодействии пользователя
        document.addEventListener('click', () => clearTimeout(redirectTimer));
        document.addEventListener('keydown', () => clearTimeout(redirectTimer));
    </script>
</body>
</html>
